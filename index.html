<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090c;--s1:#0d1117;--s2:#141a22;--s3:#1c2430;
  --b1:#1e2a38;--b2:#243040;--b3:#2c3a4a;
  --acc:#00e5ff;--acc2:#e8ff47;
  --forza:#ff3333;--iper:#3399ff;--pot:#aa44ff;--res:#33cc66;
  --warn:#ff8c00;
  --text:#dde4ec;--muted:#566070;--muted2:#38474f;
  --FD:'Bebas Neue',sans-serif;--FM:'DM Mono',monospace;--FB:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--FB);min-height:100vh;overflow-x:hidden}
.hdr{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--b1);background:rgba(13,17,23,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200}
.logo{font-family:var(--FD);font-size:1.2rem;letter-spacing:3px;color:var(--acc);flex-shrink:0}
.logo span{color:var(--text);opacity:0.25}
.scheda-name{background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--text);font-family:var(--FD);font-size:1rem;letter-spacing:2px;padding:2px 6px;outline:none;flex:1;max-width:260px;transition:border-color 0.2s}
.scheda-name:focus{border-bottom-color:var(--acc)}
.scheda-name::placeholder{color:var(--muted2)}
.hdr-right{margin-left:auto;display:flex;gap:7px;align-items:center}
.sess-count{font-family:var(--FM);font-size:0.55rem;color:var(--muted);letter-spacing:1px}
.mode-toggle{display:flex;gap:2px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:3px}
.mode-btn{background:transparent;border:none;color:var(--muted);font-family:var(--FM);font-size:0.54rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all 0.15s}
.mode-btn.on{background:var(--acc2);color:#000;font-weight:600}
.btn-save{background:var(--acc2);border:none;border-radius:7px;color:#000;font-family:var(--FD);font-size:0.8rem;letter-spacing:2px;padding:7px 14px;cursor:pointer;transition:all 0.14s}

/* MAP */
.map-row{display:flex;gap:12px;padding:14px 20px;background:var(--s1);border-bottom:1px solid var(--b1);align-items:flex-start}

.mini-btn.on-pot{background:rgba(170,68,255,0.1);border-color:var(--pot);color:var(--pot)}

.stim-legend{display:flex;gap:8px;flex-wrap:wrap}

.stim-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* VISIONE */
.visione-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 20px;background:var(--s1);border-bottom:1px solid var(--b1)}
.vis-lbl{font-family:var(--FM);font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.vis-chips{display:flex;gap:4px;flex-wrap:wrap}
.vis-chip{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--muted);font-family:var(--FM);font-size:0.54rem;padding:4px 9px;cursor:pointer;transition:all 0.14s}
.vis-chip.on{background:rgba(0,229,255,0.08);border-color:var(--acc);color:var(--acc)}
.vis-sess-chips{display:flex;gap:4px;flex-wrap:wrap}
.vis-sess-chip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--muted);font-family:var(--FM);font-size:0.52rem;padding:3px 8px;cursor:pointer;transition:all 0.14s}
.vis-sess-chip.on{border-color:var(--acc);color:var(--acc)}
.vis-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.vis-badge{font-family:var(--FM);font-size:0.5rem;color:var(--acc2);background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.2);border-radius:5px;padding:2px 6px}

/* SESS BAR */
.sess-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:10px 20px;background:var(--s1);border-bottom:1px solid var(--b1);min-height:48px}

.sess-chip-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sess-chip-name{font-family:var(--FM);font-size:0.58rem;color:var(--text)}
.sess-chip-meta{font-family:var(--FM);font-size:0.52rem;color:var(--muted)}
.sess-chip-del{cursor:pointer;color:var(--muted);font-size:0.72rem;transition:color 0.12s}
.sess-chip-del:hover{color:var(--forza)}
.sess-empty{font-family:var(--FM);font-size:0.58rem;color:var(--muted2)}

/* BUILDER */
.builder{padding:14px 20px;border-bottom:1px solid var(--b1);background:var(--s1)}
.builder-title{font-family:var(--FD);font-size:1rem;letter-spacing:2px;margin-bottom:10px}
.brow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.brow-lbl{font-family:var(--FM);font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}

/* limit bar */
.limit-bar{display:flex;align-items:center;gap:7px;padding:5px 0;display:none}
.limit-bar.show{display:flex}
.limit-dots{display:flex;gap:2px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--b2);transition:background 0.2s}
.ldot.used{background:var(--acc)}
.ldot.warn{background:var(--warn)}
.ldot.full{background:var(--forza)}
.limit-txt{font-family:var(--FM);font-size:0.54rem;color:var(--muted)}
.limit-txt.warn{color:var(--warn)}
.limit-txt.full{color:var(--forza)}

/* sel ex row */
.sel-row{min-height:28px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;padding:6px 0;border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);margin:8px 0}
.sel-empty{font-family:var(--FM);font-size:0.56rem;color:var(--muted2)}
.sel-pill{display:flex;align-items:center;gap:3px;border-radius:5px;padding:2px 7px;font-family:var(--FM);font-size:0.56rem;cursor:pointer;transition:opacity 0.14s}
.sel-pill:hover{opacity:0.6}

/* confirm */
.confirm-panel{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:10px 13px;display:none;margin-bottom:8px}
.confirm-panel.show{display:block}
.confirm-title{font-family:var(--FM);font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}

.ci{background:var(--s1);border:1px solid var(--b1);border-radius:5px;color:var(--acc);font-family:var(--FD);font-size:0.95rem;width:38px;text-align:center;padding:3px 4px;outline:none;transition:border-color 0.14s}
.ci:focus{border-color:var(--acc)}
.ci.kg{color:var(--muted);font-family:var(--FM);font-size:0.65rem;width:46px}
.ci.kg:focus{color:var(--acc)}
.csep{font-family:var(--FM);font-size:0.54rem;color:var(--muted2)}
.confirm-actions{display:flex;gap:7px;justify-content:flex-end}
.btn-add{background:var(--acc);border:none;border-radius:7px;color:#000;font-family:var(--FD);font-size:0.82rem;letter-spacing:2px;padding:7px 18px;cursor:pointer;transition:all 0.14s}
.btn-add:hover{background:#00ccee}
.btn-add:disabled{background:var(--b2);color:var(--muted);cursor:not-allowed}
.btn-cancel{background:transparent;border:1px solid var(--b2);border-radius:7px;color:var(--muted);font-family:var(--FM);font-size:0.58rem;padding:7px 13px;cursor:pointer;transition:all 0.14s;letter-spacing:1px;text-transform:uppercase}
.btn-cancel:hover{border-color:var(--muted);color:var(--text)}
.confirm-trigger-row{display:flex;justify-content:flex-end}

/* POOL */
.pool{padding:14px 20px;background:var(--bg)}
.pool-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.pool-title{font-family:var(--FD);font-size:1rem;letter-spacing:2px}

.ptab{background:transparent;border:none;color:var(--muted);font-family:var(--FM);font-size:0.52rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 11px;border-radius:5px;cursor:pointer;transition:all 0.14s}
.ptab.on{background:var(--acc);color:#000;font-weight:600}
.missing-alert{background:rgba(255,140,0,0.07);border:1px solid rgba(255,140,0,0.25);border-radius:8px;padding:8px 12px;font-family:var(--FM);font-size:0.58rem;color:#ffaa44;line-height:1.6;display:none;margin-bottom:8px}

.pool-cat{margin-bottom:8px}

.pool-cat-line{flex:1;height:1px;background:var(--b1)}
.pool-chips{display:flex;flex-wrap:wrap;gap:4px}
.ex-chip{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--text);font-family:var(--FM);font-size:0.6rem;padding:4px 9px;cursor:pointer;transition:all 0.14s;white-space:nowrap}
.ex-chip:hover{border-color:var(--b3);transform:translateY(-1px)}
.ex-chip.used-forza{background:rgba(255,51,51,0.1);border-color:rgba(255,51,51,0.4);color:var(--forza)}
.ex-chip.used-iper{background:rgba(51,153,255,0.1);border-color:rgba(51,153,255,0.4);color:var(--iper)}
.ex-chip.used-pot{background:rgba(170,68,255,0.1);border-color:rgba(170,68,255,0.4);color:var(--pot)}
.ex-chip.used-res{background:rgba(51,204,102,0.1);border-color:rgba(51,204,102,0.4);color:var(--res)}
.ex-chip.rec{box-shadow:0 0 0 1px var(--acc2);color:var(--acc2);background:rgba(232,255,71,0.05);border-color:rgba(232,255,71,0.3)}
.ex-chip.miss{box-shadow:0 0 0 1px rgba(255,140,0,0.5);background:rgba(255,140,0,0.06);border-color:rgba(255,140,0,0.35);color:#ffaa44}

/* SCHEDA VIEW */
.scheda-view{padding:14px 20px;display:none}
.scheda-view.show{display:block}
.sv-sess{background:var(--s1);border:1px solid var(--b1);border-radius:11px;margin-bottom:10px;overflow:hidden}
.sv-hdr{padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.sv-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sv-name{font-family:var(--FD);font-size:0.95rem;letter-spacing:1px;flex:1}
.sv-meta{font-family:var(--FM);font-size:0.52rem;color:var(--muted)}
.sv-body{padding:6px 0}
.sv-ex{display:flex;align-items:center;gap:7px;padding:6px 13px;border-bottom:1px solid var(--b1)}
.sv-ex:last-child{border-bottom:none}
.sv-moves{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.sv-mv{background:transparent;border:1px solid var(--b1);border-radius:3px;color:var(--muted);font-size:0.55rem;width:16px;height:13px;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.sv-mv:hover{border-color:var(--b2);color:var(--text)}
.sv-mv:disabled{opacity:0.3;cursor:not-allowed}
.sv-exname{font-size:0.74rem;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sf{background:var(--s2);border:1px solid var(--b1);border-radius:5px;color:var(--acc);font-family:var(--FD);font-size:0.9rem;width:35px;text-align:center;padding:3px 3px;outline:none;transition:border-color 0.14s}

.sf-sep{font-family:var(--FM);font-size:0.52rem;color:var(--muted2)}

}

  forza:{forza:1.0,iper:0.55,res:0.2,pot:0.75},
  iper: {forza:0.6,iper:1.0, res:0.6,pot:0.4},
  res:  {forza:0.2,iper:0.5, res:1.0,pot:0.1},
  pot:  {forza:0.75,iper:0.4,res:0.1,pot:1.0},
};
const PARADIGMS = {
  forza:{serieN:4,repsN:3, secRep:7.5,recSec:180,label:'4×3 — rec 3min'},
  iper: {serieN:4,repsN:10,secRep:5.0,recSec:75, label:'4×10 — rec 75sec'},
  pot:  {serieN:5,repsN:4, secRep:6.0,recSec:120,label:'5×4 — rec 2min'},
  res:  {serieN:3,repsN:20,secRep:2.5,recSec:60, label:'3×20 — rec 1min'},
};
const WARMUP_MIN = 10;
function minsPerEx(stim,lv){
  const p=PARADIGMS[stim];if(!p)return 8;
  const isAdv=lv==='avanzato'||lv==='elite';
  const rec=isAdv?p.recSec*1.33:p.recSec;
  return(p.serieN*p.repsN*p.secRep+(p.serieN-1)*rec)/60;
}
function maxEx(stim,dur){
  return Math.max(1,Math.floor(((dur||60)-WARMUP_MIN)/minsPerEx(stim,'intermedio')));
}
const CC={forza:'var(--forza)',iper:'var(--iper)',pot:'var(--pot)',res:'var(--res)'};
const CN={forza:'Forza',iper:'Ipertrofia',pot:'Potenza',res:'Resistenza'};
const CAT_COLORS={'trazione verticale':'#3399ff','trazione orizzontale':'#2277cc','spinta orizzontale':'#ff3333','spinta verticale':'#cc2222','isometria':'#aa44ff','gambe':'#33cc66','atletica':'#ff8c00','combat':'#ff6644'};

let chart=null,customColors=null;
let bodyView='FRONT',vizMode='volume';
let visione='totale',visioneSpecId=null;
let appMode='build';
let curStim=null,curDur=null,curSel=[];
let scheda=[],sessCounter=0,poolTab='consigliati';

window.addEventListener('DOMContentLoaded',()=>{
  const {BodyChart,ViewSide}=BodyMuscles;
  chart=new BodyChart(document.getElementById('map-single'),{
    view:ViewSide.FRONT,bodyState:{},showViewLabel:false,enableTransitions:true
  });
  const origRP=chart.refreshPath.bind(chart);
  chart.refreshPath=function(id){
    origRP(id);
    if(customColors&&customColors.has(id)){
      const p=this.musclePaths.get(id);
      if(p){p.setAttribute('fill',customColors.get(id));p.style.fillOpacity='1';}
    } else if(customColors){
      const p=this.musclePaths.get(id);
      if(p){p.setAttribute('fill','#1a2535');p.style.fillOpacity='0.35';}
    }
  };
  renderPool();updateMaps();
});

function setMode(mode,btn){
  appMode=mode;
  document.getElementById('mode-build').classList.toggle('on',mode==='build');
  document.getElementById('mode-total').classList.toggle('on',mode==='total');
  document.getElementById('builder-section').style.display=mode==='build'?'':'none';
  document.getElementById('pool-section').style.display=mode==='build'?'':'none';
  document.getElementById('sess-bar').style.display=mode==='build'?'':'none';
  const sv=document.getElementById('scheda-view');
  if(mode==='total'){sv.classList.add('show');renderSchedaView();}
  else sv.classList.remove('show');
}

function setStim(s,btn){
  curStim=s;
  document.querySelectorAll('[data-stim]').forEach(b=>b.className='mini-btn');
  btn.classList.add('on-'+s);
  refreshBtn();updateLimitBar();renderPool();renderSel();updateMaps();
}
function setDur(d,btn){
  curDur=d;
  document.querySelectorAll('[data-dur]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  refreshBtn();updateLimitBar();
}
function refreshBtn(){
  const btn=document.getElementById('btn-confirm');
  const ok=curStim&&curDur&&curSel.length>0;
  btn.disabled=!ok;btn.style.opacity=ok?'1':'0.4';
}
function updateLimitBar(){
  const bar=document.getElementById('limit-bar');
  if(!curStim||!curDur){bar.classList.remove('show');return;}
  bar.classList.add('show');
  const max=maxEx(curStim,parseInt(curDur));
  const n=curSel.length;
  const dots=document.getElementById('limit-dots');
  const txt=document.getElementById('limit-txt');
  dots.innerHTML='';
  for(let i=0;i<max;i++){
    const d=document.createElement('div');
    d.className='ldot'+(i<n?(n>=max?' full':n>=max*0.75?' warn':' used'):'');
    dots.appendChild(d);
  }
  if(n>=max){txt.className='limit-txt full';txt.textContent=`Limite raggiunto (${n}/${max}) — ${PARADIGMS[curStim].label}`;}
  else{txt.className='limit-txt'+(n>=max*0.75?' warn':'');txt.textContent=`${n}/${max} esercizi — ${PARADIGMS[curStim].label}`;}
}

function toggleEx(id){
  if(!curStim){const t=document.querySelector('.builder-title');t.style.color='var(--forza)';setTimeout(()=>t.style.color='',500);return;}
  const idx=curSel.findIndex(e=>e.id===id);
  if(idx>=0){curSel.splice(idx,1);}
  else{
    if(curDur){const max=maxEx(curStim,parseInt(curDur));if(curSel.length>=max){flashLimit();return;}}
    curSel.push({id,stim:curStim});
  }
  renderSel();renderPool();refreshBtn();updateLimitBar();updateMaps();
}
function flashLimit(){
  const bar=document.getElementById('limit-bar');
  bar.style.background='rgba(255,51,51,0.1)';setTimeout(()=>bar.style.background='',400);
}
function renderSel(){
  const row=document.getElementById('sel-row');
  const empty=document.getElementById('sel-empty');
  row.querySelectorAll('.sel-pill').forEach(p=>p.remove());
  if(!curSel.length){empty.style.display='inline';return;}
  empty.style.display='none';
  curSel.forEach(e=>{
    const ex=POOL.find(x=>x.id===e.id);
    const pill=document.createElement('div');
    pill.className='sel-pill';
    pill.style.background=CC[e.stim]+'22';
    pill.style.border='1px solid '+CC[e.stim]+'55';
    pill.style.color=CC[e.stim];
    pill.innerHTML=ex.nome+' <span style="opacity:0.5;font-size:0.5rem">✕</span>';
    pill.onclick=()=>toggleEx(e.id);
    row.appendChild(pill);
  });
}
function showConfirm(){
  const panel=document.getElementById('confirm-panel');
  const list=document.getElementById('confirm-list');
  const p=PARADIGMS[curStim];
  list.innerHTML='';
  curSel.forEach(e=>{
    const ex=POOL.find(x=>x.id===e.id);
    const row=document.createElement('div');row.className='confirm-row';
    row.innerHTML=`<div class="confirm-name" style="color:${CC[e.stim]}">${ex.nome}</div>
      <input class="ci" type="number" min="1" max="20" value="${p.serieN}" data-id="${e.id}" data-f="serie"/>
      <span class="csep">×</span>
      <input class="ci" type="number" min="1" max="200" value="${p.repsN}" data-id="${e.id}" data-f="reps"/>
      <span class="csep">@</span>
      <input class="ci kg" type="number" min="0" max="500" step="0.5" placeholder="kg" data-id="${e.id}" data-f="peso"/>`;
    list.appendChild(row);
  });
  panel.classList.add('show');
  document.getElementById('confirm-trigger-row').style.display='none';
}
function cancelConfirm(){
  document.getElementById('confirm-panel').classList.remove('show');
  document.getElementById('confirm-trigger-row').style.display='flex';
}
function addSession(){
  const list=document.getElementById('confirm-list');
  const blocchi=curSel.map(e=>{
    const si=list.querySelector(`[data-id="${e.id}"][data-f="serie"]`);
    const ri=list.querySelector(`[data-id="${e.id}"][data-f="reps"]`);
    const pi=list.querySelector(`[data-id="${e.id}"][data-f="peso"]`);
    return{esercizio:e.id,stimolo:e.stim,serie:parseInt(si?.value)||PARADIGMS[curStim].serieN,reps:parseInt(ri?.value)||PARADIGMS[curStim].repsN,peso:parseFloat(pi?.value)||null};
  });
  sessCounter++;
  scheda.push({id:'sess_'+sessCounter,nome:'Sessione '+sessCounter,stimolo:curStim,durata:curDur,blocchi});
  curSel=[];curStim=null;curDur=null;
  document.querySelectorAll('[data-stim]').forEach(b=>b.className='mini-btn');
  document.querySelectorAll('[data-dur]').forEach(b=>b.classList.remove('on'));
  document.getElementById('confirm-panel').classList.remove('show');
  document.getElementById('confirm-trigger-row').style.display='flex';
  document.getElementById('limit-bar').classList.remove('show');
  renderSel();renderSessBar();renderPool();updateMaps();updateMissingAlert();
  document.getElementById('btn-save').disabled=false;
  document.getElementById('sess-count').textContent=scheda.length+' sessioni';
  if(visione==='specifica')renderVisSessChips();
}
function renderSessBar(){
  const bar=document.getElementById('sess-bar');
  const empty=document.getElementById('sess-empty');
  bar.querySelectorAll('.sess-chip').forEach(c=>c.remove());
  empty.style.display=scheda.length?'none':'inline';
  scheda.forEach(sess=>{
    const chip=document.createElement('div');chip.className='sess-chip';
    chip.innerHTML=`<div class="sess-chip-pip" style="background:${CC[sess.stimolo]}"></div><span class="sess-chip-name">${sess.nome}</span><span class="sess-chip-meta">${CN[sess.stimolo]}·${sess.durata}'·${sess.blocchi.length}es.</span><span class="sess-chip-del" onclick="delSession('${sess.id}')">✕</span>`;
    bar.appendChild(chip);
  });
}
function delSession(id){
  scheda=scheda.filter(s=>s.id!==id);
  renderSessBar();updateMaps();updateMissingAlert();
  document.getElementById('btn-save').disabled=scheda.length===0;
  document.getElementById('sess-count').textContent=scheda.length+' sessioni';
  if(visione==='specifica')renderVisSessChips();
  if(appMode==='total')renderSchedaView();
}

// VISIONE
function setVisione(v,btn){
  visione=v;
  document.querySelectorAll('[data-vis]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const chips=document.getElementById('vis-sess-chips');
  const badge=document.getElementById('vis-badge');
  if(v==='specifica'){chips.style.display='flex';badge.style.display='none';renderVisSessChips();}
  else if(v==='attuale'){chips.style.display='none';badge.style.display='inline';}
  else{chips.style.display='none';badge.style.display='none';}
  updateMaps();
}
function renderVisSessChips(){
  const c=document.getElementById('vis-sess-chips');c.innerHTML='';
  if(!scheda.length){c.innerHTML='<span style="font-family:var(--FM);font-size:0.52rem;color:var(--muted2)">Nessuna sessione</span>';return;}
  scheda.forEach(sess=>{
    const chip=document.createElement('button');
    chip.className='vis-sess-chip'+(visioneSpecId===sess.id?' on':'');
    chip.innerHTML=`<div class="vis-pip" style="background:${CC[sess.stimolo]}"></div>${sess.nome}`;
    chip.onclick=()=>{visioneSpecId=sess.id;renderVisSessChips();updateMaps();};
    c.appendChild(chip);
  });
}
function getActiveBlocchi(){
  const fromSaved=()=>{
    if(visione==='totale') return scheda.flatMap(s=>s.blocchi);
    if(visione==='specifica') return scheda.find(s=>s.id===visioneSpecId)?.blocchi||[];
    return [];
  };
  const saved=fromSaved();
  const cur=curSel.map(e=>({esercizio:e.id,stimolo:e.stim||curStim||'iper',serie:PARADIGMS[e.stim||curStim||'iper'].serieN,reps:PARADIGMS[e.stim||curStim||'iper'].repsN}));
  return[...saved,...cur];
}

// MAPS
function toggleBodyView(side,btn){
  bodyView=side;
  document.getElementById('v-front').classList.toggle('on',side==='FRONT');
  document.getElementById('v-back').classList.toggle('on',side==='BACK');
  updateMaps();
}
function setViz(mode,btn){
  vizMode=mode;
  document.getElementById('viz-vol').classList.toggle('on',mode==='volume');
  document.getElementById('viz-stim').classList.toggle('on',mode==='stimolo');
  document.getElementById('stim-legend').style.display=mode==='stimolo'?'flex':'none';
  updateMaps();
}
function updateMaps(){
  if(!chart)return;
  const{ViewSide}=BodyMuscles;
  const blocchi=getActiveBlocchi();
  chart.update({view:bodyView==='FRONT'?ViewSide.FRONT:ViewSide.BACK});
  const titles={attuale:'Sessione in costruzione',totale:'Aggregato scheda',specifica:scheda.find(s=>s.id===visioneSpecId)?.nome||'Specifica'};
  if(vizMode==='volume'){
    customColors=null;
    const acc={};
    blocchi.forEach(b=>{
      const ex=POOL.find(x=>x.id===b.esercizio);if(!ex)return;
      const km=K_MATRIX[b.stimolo]||K_MATRIX['iper'];
      const vol=b.serie*b.reps;
      Object.entries(ex.muscoli).forEach(([m,h])=>Object.entries(km).forEach(([,k])=>{acc[m]=(acc[m]||0)+h*k*vol;}));
    });
    if(Object.keys(acc).length){
      const maxV=Math.max(...Object.values(acc));
      const bs={};
      Object.entries(acc).forEach(([m,v])=>{const ratio=v/maxV;const n=Math.min(10,Math.round((Math.log1p(ratio*9)/Math.log1p(9))*10));if(n>=1)bs[m]={intensity:n,selected:false};});
      chart.update({bodyState:bs});
    }else chart.update({bodyState:{}});
    document.getElementById('map-title').textContent='Heatmap volume — '+titles[visione];
  }else{
    chart.update({bodyState:{}});
    const sc={};
    blocchi.forEach(b=>{
      const ex=POOL.find(x=>x.id===b.esercizio);if(!ex)return;
      Object.keys(ex.muscoli).forEach(m=>{if(!sc[m])sc[m]={forza:0,iper:0,pot:0,res:0};sc[m][b.stimolo]=(sc[m][b.stimolo]||0)+1;});
    });
    if(Object.keys(sc).length){
      customColors=new Map();
      Object.entries(sc).forEach(([m,counts])=>{
        const dom=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
        const col=dom==='forza'?'#ff3333':dom==='iper'?'#3399ff':dom==='pot'?'#aa44ff':'#33cc66';
        customColors.set(m,col);
      });
      chart.refreshAllPaths();
    }else{customColors=null;chart.update({bodyState:{}});}
    document.getElementById('map-title').textContent='Stimolo dominante — '+titles[visione];
  }
}

// POOL
function setTab(tab,btn){poolTab=tab;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPool();}
function getMissing(){
  if(!scheda.length)return new Set();
  const acc={};
  scheda.forEach(sess=>sess.blocchi.forEach(b=>{const ex=POOL.find(x=>x.id===b.esercizio);if(!ex)return;Object.keys(ex.muscoli).forEach(m=>{acc[m]=(acc[m]||0)+ex.muscoli[m];});}));
  if(!Object.keys(acc).length)return new Set();
  const maxV=Math.max(...Object.values(acc));
  return new Set(POOL.flatMap(ex=>Object.keys(ex.muscoli)).filter(m=>!acc[m]||acc[m]/maxV<0.15));
}
function getRec(){
  if(!scheda.length)return new Set(['pull_up','push_up','pistol_squat','plank','dips','hollow_position','scapular_pull_up','australian_pull_up']);
  const miss=getMissing();
  const rec=new Set();
  POOL.forEach(ex=>{if(Object.keys(ex.muscoli).filter(m=>miss.has(m)).length>=2)rec.add(ex.id);});
  return rec;
}
function renderPool(){
  const grid=document.getElementById('pool-grid');grid.innerHTML='';
  const miss=getMissing();const rec=getRec();
  const usedIds=new Set(curSel.map(e=>e.id));
  let vis=POOL;
  if(poolTab==='consigliati')vis=POOL.filter(ex=>rec.has(ex.id));
  if(poolTab==='mancanti')vis=POOL.filter(ex=>Object.keys(ex.muscoli).some(m=>miss.has(m)));
  const cats=[...new Set(vis.map(ex=>ex.cat))];
  cats.forEach(cat=>{
    const exs=vis.filter(ex=>ex.cat===cat);if(!exs.length)return;
    const sec=document.createElement('div');sec.className='pool-cat';
    const col=CAT_COLORS[cat]||'#566070';
    sec.innerHTML=`<div class="pool-cat-hdr" style="color:${col}">${cat}<div class="pool-cat-line"></div></div><div class="pool-chips" id="pc-${cat.replace(/\s/g,'_')}"></div>`;
    const chips=sec.querySelector('.pool-chips');
    exs.forEach(ex=>{
      const isUsed=usedIds.has(ex.id);
      const usedEntry=curSel.find(e=>e.id===ex.id);
      const isRec=rec.has(ex.id);const isMiss=Object.keys(ex.muscoli).some(m=>miss.has(m));
      let cls='ex-chip';
      if(isUsed)cls+=' used-'+(usedEntry?.stim||'');
      else if(poolTab==='consigliati'&&isRec)cls+=' rec';
      else if(poolTab==='mancanti'&&isMiss)cls+=' miss';
      const chip=document.createElement('button');chip.className=cls;chip.textContent=ex.nome;chip.onclick=()=>toggleEx(ex.id);
      chips.appendChild(chip);
    });
    grid.appendChild(sec);
  });
  if(!vis.length)grid.innerHTML='<div style="font-family:var(--FM);font-size:0.63rem;color:var(--muted2);padding:10px">Nessun esercizio.</div>';
}
function updateMissingAlert(){
  const alert=document.getElementById('missing-alert');
  const miss=getMissing();
  if(!scheda.length||!miss.size){alert.classList.remove('show');return;}
  const groups={};
  POOL.forEach(ex=>Object.keys(ex.muscoli).forEach(m=>{if(miss.has(m)){const nm=m.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());groups[nm]=true;}}));
  const list=Object.keys(groups).slice(0,5).join(', ');
  alert.textContent='⚠️ Muscoli poco allenati: '+list+(Object.keys(groups).length>5?'...':'')+' — vedi tab Mancanti.';
  alert.classList.add('show');
}

// SCHEDA VIEW
function renderSchedaView(){
  const c=document.getElementById('scheda-view');
  if(!scheda.length){c.innerHTML='<div style="font-family:var(--FM);font-size:0.63rem;color:var(--muted2);padding:10px">Nessuna sessione.</div>';return;}
  c.innerHTML=scheda.map((sess,si)=>`
    <div class="sv-sess">
      <div class="sv-hdr">
        <div class="sv-pip" style="background:${CC[sess.stimolo]}"></div>
        <div class="sv-name">${sess.nome}</div>
        <div class="sv-meta">${CN[sess.stimolo]} · ${sess.durata}' · ${sess.blocchi.length} es.</div>
      </div>
      <div class="sv-body">
        ${sess.blocchi.map((b,bi)=>{
          const ex=POOL.find(x=>x.id===b.esercizio);
          return`<div class="sv-ex">
            <div class="sv-moves">
              <button class="sv-mv" onclick="mvEx('${sess.id}',${bi},-1)" ${bi===0?'disabled':''}>▲</button>
              <button class="sv-mv" onclick="mvEx('${sess.id}',${bi},+1)" ${bi===sess.blocchi.length-1?'disabled':''}>▼</button>
            </div>
            <div class="sv-exname" style="color:${CC[b.stimolo]}">${ex?.nome||b.esercizio}</div>
            <input class="sf" type="number" min="1" max="20" value="${b.serie}" onchange="updB('${sess.id}',${bi},'serie',this.value)"/>
            <span class="sf-sep">×</span>
            <input class="sf" type="number" min="1" max="200" value="${b.reps}" onchange="updB('${sess.id}',${bi},'reps',this.value)"/>
            <span class="sf-sep">@</span>
            <input class="sf kg" type="number" min="0" max="500" step="0.5" value="${b.peso||''}" placeholder="kg" onchange="updB('${sess.id}',${bi},'peso',this.value)"/>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}
function mvEx(sessId,idx,dir){
  const sess=scheda.find(s=>s.id===sessId);if(!sess)return;
  const ni=idx+dir;if(ni<0||ni>=sess.blocchi.length)return;
  [sess.blocchi[idx],sess.blocchi[ni]]=[sess.blocchi[ni],sess.blocchi[idx]];
  renderSchedaView();
}
function updB(sessId,idx,field,val){
  const sess=scheda.find(s=>s.id===sessId);if(!sess||!sess.blocchi[idx])return;
  sess.blocchi[idx][field]=field==='peso'?(parseFloat(val)||null):(parseInt(val)||1);
}

function saveScheda(){
  const nome=document.getElementById('scheda-name').value||'Scheda senza nome';
  localStorage.setItem('muscleMapScheda_'+Date.now(),JSON.stringify({nome,sessioni:scheda,createdAt:new Date().toISOString()}));
  alert('Scheda "'+nome+'" salvata!');
}
</script>
