<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b0f;--surface:#0f1318;--surface2:#161c24;--surface3:#1e2630;
  --border:#242d38;--border2:#2d3a47;
  --accent:#00e5ff;
  --text:#e8edf2;--muted:#5a6a7a;--muted2:#3a4a5a;
  --font-display:'Bebas Neue',sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-body:'DM Sans',sans-serif;

  /* Stimolo colors */
  --forza:#ff3333;
  --ipertrofia:#3399ff;
  --resistenza:#33cc66;
  --potenza:#aa44ff;

  /* Volume tiers — Fortnite-style */
  --vol-1:#1a3a5c;  /* bronze-ish */
  --vol-2:#1e5f8a;
  --vol-3:#1a7abf;
  --vol-4:#00aadd;
  --vol-5:#00ccff;
  --vol-6:#00eeff;
  --vol-7:#aaffee;
  --vol-8:#ffffff;

  /* Fatigue heat */
  --fat-low:#2a4a2a;
  --fat-mid:#cc8800;
  --fat-high:#ff4400;
  --fat-max:#ff0000;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow:hidden}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}
.logo{font-family:var(--font-display);font-size:1.5rem;letter-spacing:4px;color:var(--accent)}
.logo span{color:var(--text);opacity:0.3}
.mode-switch{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px}
.mode-btn{
  background:transparent;border:none;color:var(--muted);
  font-family:var(--font-mono);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;
  padding:5px 16px;border-radius:5px;cursor:pointer;transition:all 0.2s;
}
.mode-btn.active{background:var(--accent);color:#000;font-weight:500}
.hdr-info{font-family:var(--font-mono);font-size:0.62rem;color:var(--muted);letter-spacing:1px}

.app{display:grid;grid-template-columns:260px 1fr 300px;height:calc(100vh - 52px)}

.panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-label{
  font-family:var(--font-mono);font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);padding:13px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.panel-label em{color:var(--accent);font-style:normal}

.scrollable{flex:1;overflow-y:auto;overflow-x:hidden}
.scrollable::-webkit-scrollbar{width:3px}
.scrollable::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* CENTER */
.center{display:flex;flex-direction:column;align-items:center;padding:18px 12px;gap:12px;background:var(--bg);overflow-y:auto}
.center::-webkit-scrollbar{width:3px}
.center::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.row-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.toggle-group{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tg-btn{
  background:transparent;border:none;color:var(--muted);
  font-family:var(--font-mono);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;
  padding:6px 16px;cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.tg-btn.active{background:var(--accent);color:#000;font-weight:600}

.body-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px;width:100%;max-width:270px;
  display:flex;align-items:center;justify-content:center;flex:1;min-height:0;
}
#body-map{width:100%}
#body-map svg{width:100%!important;height:auto!important}

.hover-label{font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);text-align:center;min-height:16px;letter-spacing:1px;transition:color 0.15s}
.hover-label.lit{color:var(--accent)}

/* Dynamic legend */
.legend-wrap{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.56rem;color:var(--muted);letter-spacing:1px}
.legend-bar-volume{width:90px;height:4px;border-radius:2px;background:linear-gradient(to right,var(--vol-1),var(--vol-3),var(--vol-5),var(--vol-8))}
.legend-bar-fatigue{width:90px;height:4px;border-radius:2px;background:linear-gradient(to right,var(--fat-low),var(--fat-mid),var(--fat-high),var(--fat-max))}
.legend-stim{display:flex;gap:6px}
.legend-stim-item{display:flex;align-items:center;gap:3px;font-size:0.52rem}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* LEFT — exercise list */
.ex-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ex-search input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--font-mono);font-size:0.68rem;padding:7px 10px;outline:none;transition:border-color 0.15s;
}
.ex-search input:focus{border-color:var(--accent)}
.ex-search input::placeholder{color:var(--muted2)}
.ex-item{
  padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background 0.1s;display:flex;flex-direction:column;gap:2px;
}
.ex-item:hover{background:var(--surface2)}
.ex-item.selected{background:rgba(0,229,255,0.05);border-left:2px solid var(--accent);padding-left:12px}
.ex-item.in-session{opacity:0.4;cursor:default}
.ex-name{font-size:0.76rem;font-weight:500;color:var(--text)}
.ex-meta{font-family:var(--font-mono);font-size:0.58rem;color:var(--muted);display:flex;gap:8px}
.add-bar{padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.add-btn{
  width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;
  font-family:var(--font-display);font-size:0.9rem;letter-spacing:2px;
  padding:9px;cursor:pointer;transition:all 0.15s;
}
.add-btn:hover{background:#00ccee}
.add-btn:disabled{background:var(--border2);color:var(--muted2);cursor:not-allowed}
.reset-btn{
  width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-family:var(--font-mono);font-size:0.62rem;letter-spacing:1px;
  padding:7px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;margin-top:4px;
}
.reset-btn:hover{border-color:#ff4444;color:#ff4444}

/* RIGHT — stats */
.chips{padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px;min-height:36px;flex-shrink:0}
.chip{
  background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.2);
  border-radius:20px;padding:2px 9px;font-family:var(--font-mono);
  font-size:0.6rem;color:var(--accent);display:flex;align-items:center;gap:4px;
}
.chip-x{cursor:pointer;color:var(--muted);transition:color 0.1s;font-size:0.75rem}
.chip-x:hover{color:#ff4444}
.chip-empty{font-family:var(--font-mono);font-size:0.62rem;color:var(--muted2);padding:6px 12px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px 10px;flex-shrink:0}
.kpi{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.kpi-val{font-family:var(--font-display);font-size:1.5rem;line-height:1;color:var(--accent)}
.kpi-lbl{font-family:var(--font-mono);font-size:0.52rem;color:var(--muted);letter-spacing:1.5px;margin-top:2px;text-transform:uppercase}
.section{padding:10px 12px;border-top:1px solid var(--border)}
.sec-title{font-family:var(--font-mono);font-size:0.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

/* muscle bars */
.mrow{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mnm{font-family:var(--font-mono);font-size:0.6rem;color:var(--text);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbar-bg{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.mbar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.mval{font-family:var(--font-mono);font-size:0.56rem;color:var(--muted);width:26px;text-align:right}

/* stim 4-dim breakdown */
.stim-muscle{padding:6px 0;border-bottom:1px solid var(--border)}
.stim-muscle:last-child{border-bottom:none}
.stim-mname{font-family:var(--font-mono);font-size:0.62rem;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.stim-dominant{font-size:0.55rem;padding:1px 6px;border-radius:10px;font-weight:500}
.stim-bars{display:flex;flex-direction:column;gap:2px}
.sbar-row{display:flex;align-items:center;gap:5px}
.sbar-lbl{font-family:var(--font-mono);font-size:0.52rem;width:10px;flex-shrink:0;font-weight:600}
.sbar-bg{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;transition:width 0.5s}
.sbar-num{font-family:var(--font-mono);font-size:0.5rem;color:var(--muted);width:30px;text-align:right}

/* fatigue rows */
.fat-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border)}
.fat-row:last-child{border-bottom:none}
.fat-nm{font-family:var(--font-mono);font-size:0.6rem;color:var(--text);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fat-bar-bg{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.fat-bar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.fat-val{font-family:var(--font-mono);font-size:0.56rem;width:28px;text-align:right}

/* history list */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-name{font-family:var(--font-mono);font-size:0.62rem;color:var(--text)}
.hist-date{font-family:var(--font-mono);font-size:0.56rem;color:var(--muted)}
</style>
</head>

// Volume tiers: 8 levels mapped to intensity 1-10 (grouped)
// Each tier covers ~12.5% of normalized range
const VOL_TIER_COLORS = [
  '#1a3a5c','#1a5080','#1a6aa0','#0088cc',
  '#00aadd','#00ccee','#55eeff','#aaffff'
];

const STIM_CFG = {
  forza_massimale:    {color:'#ff3333', label:'F', dim:'forza'},
  ipertrofia:         {color:'#3399ff', label:'I', dim:'ipertrofia'},
  resistenza_muscolare:{color:'#33cc66',label:'R', dim:'resistenza'},
  potenza:            {color:'#aa44ff', label:'P', dim:'potenza'},
};
const DIM_COLORS = {forza:'#ff3333', ipertrofia:'#3399ff', resistenza:'#33cc66', potenza:'#aa44ff'};
const DIM_LABELS = {forza:'F', ipertrofia:'I', resistenza:'R', potenza:'P'};

const DECAY_HOURS = {
  forza_massimale:72, potenza:48, ipertrofia:36, resistenza_muscolare:24
};

const K_PESO = (reps, metodo) => {
  if (metodo !== 'con_zavorra') return 1.0;
  if (reps <= 3)  return 1.5;
  if (reps <= 6)  return 1.2;
  if (reps <= 12) return 1.0;
  return 0.8;
};

// ── STATE ─────────────────────────────────────────────────────────────
let mode      = 'present';
let viewSide  = 'FRONT';
let vizMode   = 'volume';
let chart     = null;
let session   = [];
let pending   = [];
let searchQ   = '';

// ── BOOT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const {BodyChart, ViewSide} = BodyMuscles;
  chart = new BodyChart(document.getElementById('body-map'), {
    view: ViewSide.FRONT, bodyState: {}, showViewLabel: false, enableTransitions: true,
    onMuscleHover: id => {
      const el = document.getElementById('hover-label');
      if (id) {
        el.textContent = id.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        el.classList.add('lit');
      } else { el.textContent='—'; el.classList.remove('lit'); }
    }
  });
  patchRefreshPath();

  // Restore library default warm scale (yellow → orange → red)

  document.getElementById('btn-present').addEventListener('click',()=>{mode='present';renderAll()});
  document.getElementById('btn-progress').addEventListener('click',()=>{mode='progress';renderAll()});
  document.getElementById('btn-front').addEventListener('click',()=>{
    viewSide='FRONT';
    document.getElementById('btn-front').classList.add('active');
    document.getElementById('btn-back').classList.remove('active');
    updateBodyMap();
  });
  document.getElementById('btn-back').addEventListener('click',()=>{
    viewSide='BACK';
    document.getElementById('btn-back').classList.add('active');
    document.getElementById('btn-front').classList.remove('active');
    updateBodyMap();
  });
  document.getElementById('viz-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('.tg-btn');
    if (!btn) return;
    vizMode = btn.dataset.viz;
    document.querySelectorAll('#viz-toggle .tg-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    updateLegend();
    updateBodyMap();
    renderRightPanel();
  });

  renderAll();
});

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  document.getElementById('btn-present').classList.toggle('active', mode==='present');
  document.getElementById('btn-progress').classList.toggle('active', mode==='progress');
  const vt = document.getElementById('viz-toggle');
  vt.style.display = mode==='progress' ? 'flex' : 'none';
  updateLegend();
  renderLeftPanel();
  renderRightPanel();
  updateBodyMap();
  document.getElementById('hdr-info').textContent = mode==='present'
    ? `${session.length} esercizi`
    : `${HISTORY.length} sessioni`;
}

// ── LEGEND ────────────────────────────────────────────────────────────
function updateLegend() {
  const w = document.getElementById('legend-wrap');
  if (mode==='present' || vizMode==='volume') {
    w.innerHTML = `<span>LOW</span><div class="legend-bar-volume"></div><span>HIGH</span>`;
  } else if (vizMode==='fatigue') {
    w.innerHTML = `<span>FRESH</span><div class="legend-bar-fatigue"></div><span>TIRED</span>`;
  } else {
    // stimolo legend
    w.innerHTML = `<div class="legend-stim">
      ${Object.entries(DIM_COLORS).map(([k,c])=>`
        <div class="legend-stim-item">
          <div class="legend-dot" style="background:${c}"></div>
          <span>${DIM_LABELS[k]}</span>
        </div>`).join('')}
    </div>`;
  }
}

// ── LEFT PANEL ────────────────────────────────────────────────────────
function renderLeftPanel() {
  const p = document.getElementById('left-panel');
  if (mode==='present') {
    p.innerHTML = `
      <div class="panel-label">Esercizi <em>${EXERCISES.length}</em></div>
      <div class="ex-search">
        <input type="text" id="ex-srch" placeholder="cerca..." value="${searchQ}"/>
      </div>
      <div class="scrollable" id="ex-list"></div>
      <div class="add-bar">
        <button class="add-btn" id="add-btn" disabled>AGGIUNGI</button>
        <button class="reset-btn" id="reset-btn">RESET SESSIONE</button>
      </div>`;
    document.getElementById('ex-srch').addEventListener('input', e=>{searchQ=e.target.value.toLowerCase(); renderExList();});
    document.getElementById('add-btn').addEventListener('click', addToSession);
    document.getElementById('reset-btn').addEventListener('click', ()=>{session=[];pending=[];renderAll();});
    renderExList();
  } else {
    const byT = {};
    HISTORY.forEach(s=>{ byT[s.template]=(byT[s.template]||0)+1; });
    const sorted = HISTORY.slice().sort((a,b)=>b.data.localeCompare(a.data));
    p.innerHTML = `
      <div class="panel-label">Storico <em>${HISTORY.length}</em></div>
      <div class="scrollable">
        <div class="section">
          <div class="sec-title">Templates</div>
          ${Object.entries(byT).map(([t,n])=>`
            <div class="hist-row">
              <span class="hist-name">${t.replace(/_/g,' ').toUpperCase()}</span>
              <span class="hist-date">${n}x</span>
            </div>`).join('')}
        </div>
        <div class="section">
          <div class="sec-title">Sessioni recenti</div>
          ${sorted.slice(0,10).map(s=>`
            <div class="hist-row">
              <span class="hist-name">${s.template.replace(/_/g,' ').toUpperCase()}</span>
              <span class="hist-date">${s.data}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }
}

function renderExList() {
  const list = document.getElementById('ex-list');
  if (!list) return;
  const fil = EXERCISES.filter(e=>
    e.nome.toLowerCase().includes(searchQ)||
    e.categoria_movimento.toLowerCase().includes(searchQ)
  );
  list.innerHTML = fil.map(ex=>{
    const inSess = session.includes(ex.id);
    const isPend = pending.includes(ex.id);
    const cls = inSess?'in-session':isPend?'selected':'';
    return `<div class="ex-item ${cls}" data-id="${ex.id}">
      <div class="ex-name">${ex.nome}</div>
      <div class="ex-meta"><span>${ex.categoria_movimento}</span><span>${ex.livello}</span></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.ex-item:not(.in-session)').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id;
      const idx=pending.indexOf(id);
      if(idx>=0) pending.splice(idx,1); else pending.push(id);
      renderExList();
      const btn=document.getElementById('add-btn');
      if(btn){btn.disabled=pending.length===0;btn.textContent=pending.length>0?`AGGIUNGI (${pending.length})`:'AGGIUNGI';}
    });
  });
}

function addToSession() {
  pending.forEach(id=>{if(!session.includes(id))session.push(id);});
  pending=[];
  renderAll();
}

// ── RIGHT PANEL ───────────────────────────────────────────────────────
function renderRightPanel() {
  const p = document.getElementById('right-panel');
  if (mode==='present') {
    const {state,raw} = computePresent();
    const mc = Object.keys(state).length;
    const ah = mc>0?(Object.values(state).reduce((a,b)=>a+b.intensity,0)/mc).toFixed(1):'0.0';
    const top = Object.entries(raw).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxR = top.length?top[0][1]:1;
    p.innerHTML = `
      <div class="panel-label">Sessione</div>
      <div class="chips" id="chips">
        ${session.length===0?'<div class="chip-empty">nessun esercizio</div>':
          session.map(id=>{const ex=EXERCISES.find(e=>e.id===id);return `<div class="chip">${ex.nome}<span class="chip-x" data-id="${id}">✕</span></div>`;}).join('')}
      </div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-val">${mc}</div><div class="kpi-lbl">Muscoli</div></div>
        <div class="kpi"><div class="kpi-val">${ah}</div><div class="kpi-lbl">Heat Medio</div></div>
        <div class="kpi"><div class="kpi-val">${session.length}</div><div class="kpi-lbl">Esercizi</div></div>
        <div class="kpi"><div class="kpi-val">${new Set(session.map(id=>EXERCISES.find(e=>e.id===id)?.categoria_movimento)).size}</div><div class="kpi-lbl">Categorie</div></div>
      </div>
      <div class="section">
        <div class="sec-title">Muscoli più attivi</div>
        ${top.length===0?'<div style="font-family:var(--font-mono);font-size:0.62rem;color:var(--muted2);padding:8px">aggiungi esercizi</div>':
          top.map(([m,v])=>{
            const pct=Math.round((v/maxR)*100);
            const nm=m.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return `<div class="mrow">
              <div class="mnm">${nm}</div>
              <div class="mbar-bg"><div class="mbar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
              <div class="mval">${v.toFixed(0)}</div>
            </div>`;
          }).join('')}
      </div>`;
    p.querySelectorAll('.chip-x').forEach(el=>{
      el.addEventListener('click',()=>{session=session.filter(s=>s!==el.dataset.id);renderAll();});
    });
  } else {
    const prog = computeProgress();
    const fatRaw = computeFatigue();
    const fat    = getFatigueTotals(fatRaw);

    if (vizMode==='volume') {
      const top = Object.entries(prog)
        .map(([m,d])=>({m,total:Object.values(d).reduce((a,b)=>a+b,0)}))
        .sort((a,b)=>b.total-a.total).slice(0,10);
      const maxT = top.length?top[0].total:1;
      p.innerHTML = `
        <div class="panel-label">Volume <em>cumulativo</em></div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-val">${HISTORY.length}</div><div class="kpi-lbl">Sessioni</div></div>
          <div class="kpi"><div class="kpi-val">${Object.keys(prog).length}</div><div class="kpi-lbl">Muscoli</div></div>
        </div>
        <div class="section">
          <div class="sec-title">Top muscoli allenati</div>
          ${top.map(({m,total})=>{
            const pct=Math.round((total/maxT)*100);
            const tierIdx=Math.min(7,Math.floor(pct/12.5));
            const col=VOL_TIER_COLORS[tierIdx];
            const nm=m.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return `<div class="mrow">
              <div class="mnm">${nm}</div>
              <div class="mbar-bg"><div class="mbar-fill" style="width:${pct}%;background:${col}"></div></div>
              <div class="mval" style="color:${col}">${Math.round(total)}</div>
            </div>`;
          }).join('')}
        </div>`;

    } else if (vizMode==='stimolo') {
      const top = Object.entries(prog)
        .map(([m,d])=>({m,total:Object.values(d).reduce((a,b)=>a+b,0),dims:d}))
        .sort((a,b)=>b.total-a.total).slice(0,7);
      p.innerHTML = `
        <div class="panel-label">Stimolo <em>dominante</em></div>
        <div class="scrollable">
        <div class="section">
          <div class="sec-title">Breakdown per muscolo</div>
          ${top.map(({m,dims})=>{
            const nm=m.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            const domDim=Object.entries(dims).sort((a,b)=>b[1]-a[1])[0][0];
            const domCol=DIM_COLORS[domDim];
            const domLbl=DIM_LABELS[domDim];
            const dimMax=Math.max(...Object.values(dims),1);
            return `<div class="stim-muscle">
              <div class="stim-mname">
                ${nm}
                <span class="stim-dominant" style="background:${domCol}22;color:${domCol};border:1px solid ${domCol}44">${domLbl}</span>
              </div>
              <div class="stim-bars">
                ${Object.entries(DIM_COLORS).map(([dim,col])=>{
                  const val=dims[dim]||0;
                  const pct=Math.round((val/dimMax)*100);
                  return `<div class="sbar-row">
                    <div class="sbar-lbl" style="color:${col}">${DIM_LABELS[dim]}</div>
                    <div class="sbar-bg"><div class="sbar-fill" style="width:${pct}%;background:${col}"></div></div>
                    <div class="sbar-num">${Math.round(val)}</div>
                  </div>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
        </div></div>`;

    } else {
      // fatigue
      const top = Object.entries(fat).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const maxF = top.length?top[0][1]:1;
      p.innerHTML = `
        <div class="panel-label">Fatigue <em>stima</em></div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-val">${top.filter(([,v])=>v/maxF>0.6).length}</div><div class="kpi-lbl">Affaticati</div></div>
          <div class="kpi"><div class="kpi-val">${top.filter(([,v])=>v/maxF<0.3).length}</div><div class="kpi-lbl">Freschi</div></div>
        </div>
        <div class="section">
          <div class="sec-title">Livello fatica</div>
          ${top.map(([m,v])=>{
            const pct=Math.round((v/maxF)*100);
            const col=pct>70?'#ff2200':pct>50?'#ff6600':pct>30?'#cc8800':'#2a6a2a';
            const nm=m.replace(/-(left|right)/g,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return `<div class="fat-row">
              <div class="fat-nm">${nm}</div>
              <div class="fat-bar-bg"><div class="fat-bar-fill" style="width:${pct}%;background:${col}"></div></div>
              <div class="fat-val" style="color:${col}">${pct}%</div>
            </div>`;
          }).join('')}
        </div>`;
    }
  }
}

// ── COMPUTE PRESENT ───────────────────────────────────────────────────
function computePresent() {
  const acc={};
  session.forEach(id=>{
    const ex=EXERCISES.find(e=>e.id===id);
    if(!ex)return;
    Object.entries(ex.muscoli_svg).forEach(([m,h])=>{acc[m]=(acc[m]||0)+h;});
  });
  const max=Math.max(...Object.values(acc),1);
  const state={};
  Object.entries(acc).forEach(([m,v])=>{
    const n=Math.min(10,(v/max)*10);
    if(n>=1)state[m]={intensity:Math.round(n),selected:false};
  });
  return {state,raw:acc};
}

// ── COMPUTE PROGRESS ──────────────────────────────────────────────────
function computeProgress() {
  const prog={};
  HISTORY.forEach(sess=>{
    sess.blocchi.forEach(b=>{
      const ex=EXERCISES.find(e=>e.id===b.esercizio);
      if(!ex)return;
      const km=K_MATRIX[b.stimolo];
      if(!km)return;
      const kp=K_PESO(b.reps,b.metodo);
      const vol=b.serie*b.reps;
      Object.entries(ex.muscoli_svg).forEach(([m,heat])=>{
        if(!prog[m])prog[m]={forza:0,ipertrofia:0,resistenza:0,potenza:0};
        Object.entries(km).forEach(([dim,k])=>{
          prog[m][dim]=(prog[m][dim]||0)+heat*k*kp*vol;
        });
      });
    });
  });
  return prog;
}

// ── COMPUTE FATIGUE ───────────────────────────────────────────────────
function computeFatigue() {
  // Returns { muscleId: { total, forza, ipertrofia, resistenza, potenza } }
  // Each stimolo decays independently at its own rate
  const now = new Date();
  const fat = {};

  HISTORY.forEach(sess => {
    const sd = new Date(sess.data);
    const hoursAgo = (now - sd) / 3600000;

    sess.blocchi.forEach(b => {
      const ex = EXERCISES.find(e => e.id === b.esercizio);
      if (!ex) return;

      const dh = DECAY_HOURS[b.stimolo] || 36;
      const df = Math.exp(-hoursAgo / dh);
      if (df < 0.01) return; // fully recovered

      const kp  = K_PESO(b.reps, b.metodo);
      const vol  = b.serie * b.reps;
      const km   = K_MATRIX[b.stimolo];
      if (!km) return;

      Object.entries(ex.muscoli_svg).forEach(([m, heat]) => {
        if (!fat[m]) fat[m] = { total:0, forza:0, ipertrofia:0, resistenza:0, potenza:0 };
        // Contribution to each dimension, decayed
        Object.entries(km).forEach(([dim, k]) => {
          const contrib = heat * k * kp * vol * df;
          fat[m][dim]  += contrib;
          fat[m].total += contrib;
        });
      });
    });
  });

  return fat;
}

// Helper: returns flat { muscleId: totalFatigue } for coloring
function getFatigueTotals(fat) {
  const totals = {};
  Object.entries(fat).forEach(([m, dims]) => { totals[m] = dims.total; });
  return totals;
}

// ── UPDATE BODY MAP ───────────────────────────────────────────────────
let _colorTimer = null;

function updateBodyMap() {
  if(!chart) return;
  const {ViewSide} = BodyMuscles;
  chart.update({view: viewSide==='FRONT' ? ViewSide.FRONT : ViewSide.BACK});

  if (mode==='present') {
    clearCustomColors();
    const {state} = computePresent();
    chart.update({bodyState: state});

  } else if (vizMode==='volume') {
    clearCustomColors();
    // Use library's bodyState directly — library handles the color scale
    const prog = computeProgress();
    const totals = {};
    Object.entries(prog).forEach(([m,d]) => { totals[m] = Object.values(d).reduce((a,b)=>a+b,0); });
    const vals = Object.values(totals);
    const maxT = vals.length ? Math.max(...vals) : 1;
    const bodyState = {};
    Object.entries(totals).forEach(([m,v]) => {
      // log scale: Math.log1p gives strong contrast at low values,
      // gradual compression at high — distinguishes proportions well
      const ratio = v / maxT;
      const n = Math.min(10, Math.round((Math.log1p(ratio * 9) / Math.log1p(9)) * 10));
      if(n >= 1) bodyState[m] = {intensity: n, selected: false};
    });
    chart.update({bodyState});

  } else {
    // stimolo / fatigue: reset library colors, then override via setAttribute
    chart.update({bodyState: {}});
    clearTimeout(_colorTimer);
    _colorTimer = setTimeout(() => overrideColors(), 200);
  }
}

// Custom color map — used by patched refreshPath
let _customColors = null; // null = use library default, Map = use custom

function patchRefreshPath() {
  const orig = chart.refreshPath.bind(chart);
  chart.refreshPath = function(muscleId) {
    orig(muscleId); // library sets fill from bodyState
    if (_customColors) {
      const path = this.musclePaths.get(muscleId);
      if (!path) return;
      if (_customColors.has(muscleId)) {
        // muscle has custom color — override fill AND opacity
        path.setAttribute('fill', _customColors.get(muscleId));
        path.style.fillOpacity = '1';
        path.style.filter = 'none'; // remove glow from hover
      } else {
        // muscle not in custom map — make it very dark/invisible
        path.setAttribute('fill', '#1a2535');
        path.style.fillOpacity = '0.4';
      }
    }
  };
}

function overrideColors() {
  if (!chart || !chart.musclePaths) return;
  _customColors = new Map();

  if (vizMode === 'stimolo') {
    const prog = computeProgress();
    chart.musclePaths.forEach((path, muscleId) => {
      const dims = prog[muscleId];
      if (dims) {
        const domDim = Object.entries(dims).sort((a,b)=>b[1]-a[1])[0][0];
        _customColors.set(muscleId, DIM_COLORS[domDim]);
      }
    });
  } else if (vizMode === 'fatigue') {
    const fat = computeFatigue();
    const totals = getFatigueTotals(fat);
    const maxF = Math.max(...Object.values(totals), 1);
    chart.musclePaths.forEach((path, muscleId) => {
      const v = totals[muscleId] || 0;
      const pct = v / maxF;
      // skip low fatigue (<= 30%) — leave uncolored
      if (pct <= 0.3) return;
      const col = pct>0.7 ? '#ff2200' : pct>0.5 ? '#ff6600' : '#cc8800';
      _customColors.set(muscleId, col);
    });
  }

  // Use refreshAllPaths so patchRefreshPath is in sync from the start
  // This fixes the hover bug: library won't overwrite our colors on mouseenter
  chart.refreshAllPaths();
}

function clearCustomColors() {
  _customColors = null;
}
</script>
